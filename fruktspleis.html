<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fruktspleis – Skolesaus</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></link>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f8ec93;
    font-family: 'Nunito', sans-serif;
    color: #3a2c1f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  #activity-header {
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid rgba(255,235,140,0.6);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo-area { display: flex; align-items: baseline; gap: 20px; }

  #activity-header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    color: #5a3e1b;
    letter-spacing: 0.02em;
  }

  #main {
    display: flex;
    flex: 1;
    justify-content: center;
    align-items: center;
    padding: 24px 20px;
  }

  #activity-center { display: flex; flex-direction: column; align-items: center; }

  #activity-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    background: rgba(0,0,0,0.05);
    padding: 20px 28px;
    border-radius: 56px;
  }

  #left-panel {
    width: 130px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .panel-box {
    background: rgba(90,62,27,0.2);
    backdrop-filter: blur(4px);
    border-radius: 32px;
    padding: 16px 8px;
    text-align: center;
    border: 1px solid rgba(255,220,100,0.8);
    box-shadow: 0 6px 12px rgba(0,0,0,0.1);
  }

  .panel-label {
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    color: #7a551e;
    letter-spacing: 2px;
  }

  #score-value, #best-value {
    font-family: 'Fredoka One', cursive;
    font-size: 38px;
    color: #b45f1b;
    text-shadow: 2px 2px 0 #ffe2a4;
  }

  #next-canvas { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }

  #canvas-area {
    position: relative;
    border-radius: 36px;
    box-shadow: 0 16px 28px rgba(0,0,0,0.25);
  }

  #activityCanvas {
    display: block;
    border-radius: 32px;
    border: 4px solid #e6b84e;
    background: #fef085;
    cursor: crosshair;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.2);
  }

  #drop-indicator {
    position: absolute;
    top: 0;
    width: 3px;
    background: transparent;
    pointer-events: none;
    transform: translateX(-50%);
    height: 100%;
    display: none;
  }

  .dashed-line {
    position: absolute;
    top: 0;
    width: 3px;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.5), rgba(0,0,0,0.5) 8px,
      rgba(255,215,0,0.7) 8px, rgba(255,215,0,0.7) 16px
    );
    pointer-events: none;
    transform: translateX(-50%);
    border-radius: 2px;
  }

  #overlay {
    position: absolute;
    inset: 0;
    border-radius: 32px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 20px;
  }

  #overlay h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 48px;
    color: #ffcc66;
    text-shadow: 0 0 10px #ffa500;
  }

  #restart-btn {
    background: linear-gradient(145deg, #f7d44a, #e6a017);
    border: none;
    border-radius: 60px;
    padding: 14px 42px;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: #3a2c1f;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
  }

  #restart-btn:hover { transform: scale(1.05); background: #ffdf7e; }

  #right-panel { width: 130px; display: flex; flex-direction: column; gap: 18px; }

  @media (max-width: 700px) {
    #left-panel, #right-panel { width: 100px; }
    #activity-wrapper { gap: 10px; padding: 12px; }
  }
</style>
</head>
<body>

<div id="main">
  <div id="activity-center">
    <div id="activity-wrapper">
      <div id="left-panel">
        <div class="panel-box">
          <div class="panel-label">POENG</div>
          <div id="score-value">0</div>
        </div>
        <div class="panel-box">
          <div class="panel-label">BESTE</div>
          <div id="best-value">0</div>
        </div>
        <div class="panel-box">
          <div class="panel-label">NESTE</div>
          <div id="next-preview">
            <canvas id="next-canvas" width="80" height="80"></canvas>
          </div>
        </div>
      </div>

      <div id="canvas-area">
        <canvas id="activityCanvas" width="430" height="560"></canvas>
        <div id="drop-indicator">
          <div class="dashed-line" id="dynamicDashed"></div>
        </div>
        <div id="overlay">
          <h2>💥 DU TAPTE 💥</h2>
          <div class="final-score" style="font-size:32px;color:#ffcc66;">Poeng: <span id="final-score-val" style="font-size:32px;color:#ffcc66;">0</span></div>
          <button id="restart-btn">🍎 Spill Igjen 🍊</button>
        </div>
      </div>

      <div id="right-panel"></div>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script src="skolesaus-tracking.js"></script>
<script src="cookie-modal.js"></script>
<script type="module">
  // FIX 1: Correct CDN URL for Rapier2D
  import * as RAPIER from 'https://cdn.jsdelivr.net/npm/@dimforge/rapier2d-compat@0.16.1/rapier.es.js';
  await RAPIER.init();

  const CANVAS_W = 410, CANVAS_H = 560;
  const WALL_TOP_PX = 64;

  const PHYSICS_W = 0.6;
  const PHYSICS_H = 0.9;
  const WALL_THICKNESS = PHYSICS_W / 20;

  function pxToMetersX(px) { return (px / CANVAS_W) * PHYSICS_W; }
  function pxToMetersY(px) { return (px / CANVAS_H) * PHYSICS_H; }
  function metersToPxX(m) { return (m / PHYSICS_W) * CANVAS_W; }
  function metersToPxY(m) { return (m / PHYSICS_H) * CANVAS_H; }

  const GAME_OVER_HEIGHT = pxToMetersY(WALL_TOP_PX);

  const FRUIT_TYPES = [
    { name:'Cherry',     pixelRadius:17, physicsRadius: pxToMetersX(17), color:'#e8334a', emoji:'🍒', points:1  },
    { name:'Lemon',      pixelRadius:24, physicsRadius: pxToMetersX(24), color:'#f9e04b', emoji:'🍋', points:3 },
    { name:'Grape',      pixelRadius:31, physicsRadius: pxToMetersX(31), color:'#9b59b6', emoji:'🍇', points:8  },
    { name:'Strawberry', pixelRadius:38, physicsRadius: pxToMetersX(38), color:'#f74a60', emoji:'🍓', points:12 },
    { name:'Orange',     pixelRadius:45, physicsRadius: pxToMetersX(45), color:'#f5820d', emoji:'🍊', points:16  },
    { name:'Apple',      pixelRadius:52, physicsRadius: pxToMetersX(52), color:'#e84040', emoji:'🍎', points:21 },
    { name:'Pear',       pixelRadius:59, physicsRadius: pxToMetersX(59), color:'#8bc34a', emoji:'🍐', points:28 },
    { name:'Peach',      pixelRadius:66, physicsRadius: pxToMetersX(66), color:'#ffb347', emoji:'🍑', points:36 },
    { name:'Pineapple',  pixelRadius:73, physicsRadius: pxToMetersX(73), color:'#ffd700', emoji:'🍍', points:45 },
    { name:'Melon',      pixelRadius:80, physicsRadius: pxToMetersX(80), color:'#77dd77', emoji:'🍈', points:55 },
    { name:'Watermelon', pixelRadius:87, physicsRadius: pxToMetersX(87), color:'#3cb371', emoji:'🍉', points:66 },
  ];

  const GRAVITY = 9.86 * 0.15;
  const RESTITUTION = 0.25;
  const FRICTION = 0.35;
  const LINEAR_DAMPING = 0.2;
  const ANGULAR_DAMPING = 0.4;
  const SOLVER_ITERATIONS = 8;

  let physicsWorld = null;
  let eventQueue = null;
  let colliderMap = new Map();

  let fruits = [];
  let fruitRenderStates = [];
  let score = 0;
  let isActivityOver = false;
  let currentFruitType = 0;
  let nextFruitType = 0;
  let mouseX = CANVAS_W / 2;
  let canDrop = true;
  let dropCooldown = 0;
  let particles = [];
  let mergeEffects = [];
  let bestScore = localStorage.getItem('fruitBest') ? parseInt(localStorage.getItem('fruitBest')) : 0;
  let gentleShake = 0;
  let comboFlash = 0;
  let currentId = 0;

  const canvas = document.getElementById('activityCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  const nextCanvas = document.getElementById('next-canvas');
  const nextCtx = nextCanvas.getContext('2d');
  nextCanvas.width = 80;
  nextCanvas.height = 80;

  const scoreEl = document.getElementById('score-value');
  const bestEl = document.getElementById('best-value');
  const overlay = document.getElementById('overlay');
  const finalScoreEl = document.getElementById('final-score-val');
  const dropIndicatorDiv = document.getElementById('drop-indicator');

  bestEl.textContent = bestScore;

  class Fruit {
    constructor(fruitIndex, x, y) {
      const fruitData = FRUIT_TYPES[fruitIndex];
      if (!fruitData) throw new Error(`Invalid fruitIndex: ${fruitIndex}`);

      this.id = ++currentId;
      this.fruitIndex = fruitIndex;
      this.pixelRadius = fruitData.pixelRadius;
      this.physicsRadius = fruitData.physicsRadius;
      this.points = fruitData.points;
      this.name = fruitData.name;

      const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
        .setTranslation(x, y)
        .setLinearDamping(LINEAR_DAMPING)
        .setAngularDamping(ANGULAR_DAMPING);
      this.body = physicsWorld.createRigidBody(bodyDesc);

      const colliderDesc = RAPIER.ColliderDesc.ball(this.physicsRadius)
        .setRestitution(RESTITUTION)
        .setFriction(FRICTION)
        .setActiveEvents(RAPIER.ActiveEvents.COLLISION_EVENTS);
      this.collider = physicsWorld.createCollider(colliderDesc, this.body);

      this.startOutOfBounds = null;
    }

    isOutOfBounds() {
      const topY = this.body.translation().y - this.physicsRadius;
      if (topY < GAME_OVER_HEIGHT) {
        if (this.startOutOfBounds && performance.now() - this.startOutOfBounds > 1000) {
          return true;
        }
        if (!this.startOutOfBounds) {
          this.startOutOfBounds = performance.now();
        }
      } else {
        this.startOutOfBounds = null;
      }
      return false;
    }

    destroy() {
      if (this.body && this.collider) {
        try {
          physicsWorld.removeCollider(this.collider, false);
          physicsWorld.removeRigidBody(this.body);
        } catch(e) {
          // Already removed
        }
      }
    }
  }

  class Boundary {
    constructor(x, y, width, height) {
      const bodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(x, y);
      this.body = physicsWorld.createRigidBody(bodyDesc);
      const colliderDesc = RAPIER.ColliderDesc.cuboid(width / 2, height / 2);
      this.collider = physicsWorld.createCollider(colliderDesc, this.body);
    }
  }

  function initPhysics() {
    try {
      const gravity = new RAPIER.Vector2(0.0, GRAVITY);
      physicsWorld = new RAPIER.World(gravity);
      physicsWorld.integrationParameters.numSolverIterations = SOLVER_ITERATIONS;
      eventQueue = new RAPIER.EventQueue(true);

      createWalls();

      currentFruitType = randomDropType();
      pickNext();
      activityLoop();

    } catch (error) {
      console.error('Failed to initialize Rapier physics:', error);
      alert('Kunne ikke laste fysikkmotoren. Prøv å laste siden på nytt. Feil: ' + error.message);
    }
  }

  function createWalls() {
    const leftWall = new Boundary(-WALL_THICKNESS / 2, PHYSICS_H / 2, WALL_THICKNESS, PHYSICS_H);
    const rightWall = new Boundary(PHYSICS_W + WALL_THICKNESS / 2, PHYSICS_H / 2, WALL_THICKNESS, PHYSICS_H);
    const floor = new Boundary(PHYSICS_W / 2, PHYSICS_H + WALL_THICKNESS / 2, PHYSICS_W, WALL_THICKNESS);
    // Walls don't need to be in colliderMap since we check instanceof Fruit
  }

  function addFruit(fruitIndex, x, y) {
    const fruit = new Fruit(fruitIndex, x, y);
    fruits.push(fruit);
    // FIX 2: Key by collider handle (not body handle) to match collision events
    colliderMap.set(fruit.collider.handle, fruit);

    fruitRenderStates.push({
      id: fruit.id,
      x: metersToPxX(x),
      y: metersToPxY(y),
      rotation: 0,
      fruitIndex: fruitIndex,
      pixelRadius: fruit.pixelRadius,
      scale: 0.1,
      scaleTarget: 1,
      merging: false
    });

    return fruit;
  }

  function spawnFruit(pxX) {
    if (isActivityOver || !canDrop || !physicsWorld) return;

    const fruitData = FRUIT_TYPES[currentFruitType];
    const spawnX = Math.max(fruitData.pixelRadius, Math.min(CANVAS_W - fruitData.pixelRadius, pxX));
    const physicsX = pxToMetersX(spawnX);
    const physicsY = pxToMetersY(30);

    let spawnBlocked = false;
    for (const fruit of fruits) {
      const pos = fruit.body.translation();
      const dx = physicsX - pos.x;
      const dy = physicsY - pos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = fruit.physicsRadius + fruitData.physicsRadius;
      if (dist < minDist) {
        spawnBlocked = true;
        break;
      }
    }

    if (spawnBlocked) {
      let nearTop = false;
      for (const fruit of fruits) {
        const pos = fruit.body.translation();
        const topY = pos.y - fruit.physicsRadius;
        if (topY < GAME_OVER_HEIGHT + 0.1) {
          nearTop = true;
          break;
        }
      }
      if (nearTop) {
        triggerActivityOver();
        return;
      }
      return;
    }

    const fruit = addFruit(currentFruitType, physicsX, physicsY);
    fruit.body.setLinvel({ x: 0, y: 0.2 }, true);

    currentFruitType = nextFruitType;
    pickNext();
    canDrop = false;
    dropCooldown = 36;

    spawnParticles(spawnX, 32, fruitData.color, 5);
  }

  // Track pending merges to avoid double-merging
  const pendingMerges = new Set();

  function mergeFruits(fruitA, fruitB) {
    // FIX 3: Guard against already-destroyed bodies
    try {
      if (!fruitA.body || !fruitB.body) return;
      fruitA.body.translation(); // Will throw if invalid
      fruitB.body.translation();
    } catch(e) {
      return;
    }

    const posA = fruitA.body.translation();
    const posB = fruitB.body.translation();
    const midX = (posA.x + posB.x) / 2;
    const midY = (posA.y + posB.y) / 2;

    let nextIndex = fruitA.fruitIndex + 1;
    if (nextIndex >= FRUIT_TYPES.length) nextIndex = FRUIT_TYPES.length - 1;

    const nextFruitData = FRUIT_TYPES[nextIndex];

    // FIX 4: Remove from colliderMap using collider.handle (not body.handle)
    colliderMap.delete(fruitA.collider.handle);
    colliderMap.delete(fruitB.collider.handle);

    fruitA.destroy();
    fruitB.destroy();

    fruits = fruits.filter(f => f !== fruitA && f !== fruitB);
    fruitRenderStates = fruitRenderStates.filter(rs => rs.id !== fruitA.id && rs.id !== fruitB.id);

    // Only spawn merged fruit if not at max
    if (fruitA.fruitIndex < FRUIT_TYPES.length - 1) {
      const newFruit = addFruit(nextIndex, midX, midY);
      newFruit.body.setLinvel({ x: 0, y: -0.5 }, true);
    }

    updateScore(nextFruitData.points);

    const pxX = metersToPxX(midX);
    const pxY = metersToPxY(midY);
    spawnParticles(pxX, pxY, nextFruitData.color, 18);
    spawnMergeEffect(pxX, pxY, nextFruitData.pixelRadius, nextFruitData.color, nextIndex);
  }

  function handleCollisionEvents() {
    if (!eventQueue) return;

    const mergedHandlesThisStep = new Set();
    const mergePairs = [];

    eventQueue.drainCollisionEvents((handle1, handle2, started) => {
      if (!started) return;

      const itemA = colliderMap.get(handle1);
      const itemB = colliderMap.get(handle2);

      if (!itemA || !itemB) return;
      if (!(itemA instanceof Fruit) || !(itemB instanceof Fruit)) return;
      if (mergedHandlesThisStep.has(handle1) || mergedHandlesThisStep.has(handle2)) return;

      if (itemA.fruitIndex === itemB.fruitIndex && itemA.fruitIndex < FRUIT_TYPES.length - 1) {
        mergePairs.push({ fruitA: itemA, fruitB: itemB });
        mergedHandlesThisStep.add(handle1);
        mergedHandlesThisStep.add(handle2);
      }
    });

    for (const { fruitA, fruitB } of mergePairs) {
      mergeFruits(fruitA, fruitB);
    }
  }

  function syncFruitsToRenderState() {
    for (const fruit of fruits) {
      try {
        const pos = fruit.body.translation();
        const pxX = metersToPxX(pos.x);
        const pxY = metersToPxY(pos.y);
        const rotation = fruit.body.rotation();

        let renderState = fruitRenderStates.find(rs => rs.id === fruit.id);
        if (renderState) {
          renderState.x = pxX;
          renderState.y = pxY;
          renderState.rotation = rotation;
        }
      } catch(e) {
        // Body might be invalid, skip
      }
    }

    const fruitIds = new Set(fruits.map(f => f.id));
    fruitRenderStates = fruitRenderStates.filter(rs => fruitIds.has(rs.id));
  }

  function checkActivityOver() {
    if (isActivityOver) return;
    for (const fruit of fruits) {
      if (fruit.isOutOfBounds()) {
        triggerActivityOver();
        return;
      }
    }
  }

  function triggerActivityOver() {
    if (isActivityOver) return;
    isActivityOver = true;
    finalScoreEl.textContent = score;
    overlay.style.display = 'flex';
    dropIndicatorDiv.style.display = 'none';
  }

  function updateScore(add) {
    score += add;
    scoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('fruitBest', bestScore);
      bestEl.textContent = bestScore;
    }
    comboFlash = 8;
  }

  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.2,
        life: 0.9,
        decay: 0.03 + Math.random() * 0.04,
        radius: 2 + Math.random() * 5,
        color
      });
    }
  }

  function spawnMergeEffect(x, y, radius, color, fruitTypeIndex) {
    mergeEffects.push({ x, y, radius, maxR: radius * 2.3, color, life: 1 });
    for (let s = 0; s < 14; s++) {
      const ang = Math.random() * Math.PI * 2;
      const radSpd = 1.5 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(ang) * radSpd,
        vy: Math.sin(ang) * radSpd - 1,
        life: 0.85,
        decay: 0.035,
        radius: 2 + Math.random() * 4,
        color: '#FFD966'
      });
    }
    gentleShake = (fruitTypeIndex >= 7) ? 3.5 : 0;
  }

  function randomDropType() {
    const weights = [30, 25, 20, 15, 10];
    let total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < weights.length; i++) {
      r -= weights[i];
      if (r <= 0) return i;
    }
    return 0;
  }

  function pickNext() {
    nextFruitType = randomDropType();
    drawNextFruit();
  }

  function drawStrawberryShape(ctx, radius, color) {
    ctx.beginPath();
    ctx.moveTo(0, -radius * 0.82);
    ctx.bezierCurveTo(radius * 0.32, -radius * 0.9, radius * 0.72, -radius * 0.38, radius * 0.84, radius * 0.28);
    ctx.bezierCurveTo(radius * 0.88, radius * 0.74, radius * 0.46, radius * 1.02, 0, radius * 0.94);
    ctx.bezierCurveTo(-radius * 0.46, radius * 1.02, -radius * 0.88, radius * 0.74, -radius * 0.84, radius * 0.28);
    ctx.bezierCurveTo(-radius * 0.72, -radius * 0.38, -radius * 0.32, -radius * 0.9, 0, -radius * 0.82);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawGrapeCloudShape(ctx, radius, color) {
    const bumpRadius = radius * 0.35;
    const numBumps = 12;
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.75, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    for (let i = 0; i < numBumps; i++) {
      const angle = (i / numBumps) * Math.PI * 2;
      const bx = Math.cos(angle) * (radius * 0.7);
      const by = Math.sin(angle) * (radius * 0.7);
      ctx.beginPath();
      ctx.arc(bx, by, bumpRadius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }
  }

  function drawNextFruit() {
    nextCtx.clearRect(0, 0, 80, 80);
    const ft = FRUIT_TYPES[nextFruitType];
    const r = Math.min(ft.pixelRadius, 32);
    nextCtx.save();
    nextCtx.translate(40, 40);
    nextCtx.shadowBlur = 8;
    nextCtx.shadowColor = ft.color;

    if (nextFruitType === 2) {
      drawGrapeCloudShape(nextCtx, r, ft.color);
    } else if (nextFruitType === 3) {
      drawStrawberryShape(nextCtx, r, ft.color);
    } else {
      nextCtx.beginPath();
      nextCtx.arc(0, 0, r, 0, Math.PI * 2);
      nextCtx.fillStyle = ft.color;
      nextCtx.fill();
    }

    nextCtx.font = `${r * 1.2}px "Segoe UI Emoji","Apple Color Emoji"`;
    nextCtx.textAlign = 'center';
    nextCtx.textBaseline = 'middle';
    nextCtx.fillStyle = '#fff2d0';
    nextCtx.shadowBlur = 3;
    nextCtx.fillText(ft.emoji, 0, 2);
    nextCtx.restore();
  }

  function drawBackground() {
    ctx.fillStyle = '#fef085';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#e6c458';
    ctx.globalAlpha = 0.25;
    ctx.fillRect(0, 0, CANVAS_W, 8);
    ctx.fillRect(0, CANVAS_H - 12, CANVAS_W, 12);
    ctx.fillRect(0, 0, 6, CANVAS_H);
    ctx.fillRect(CANVAS_W - 6, 0, 6, CANVAS_H);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#d4a24e';
    ctx.globalAlpha = 0.4;
    ctx.fillRect(0, WALL_TOP_PX - 2, CANVAS_W, 3);
    ctx.globalAlpha = 1;
  }

  function drawDropGuide() {
    if (isActivityOver || !canDrop) return;
    const ft = FRUIT_TYPES[currentFruitType];
    const cx = Math.max(ft.pixelRadius, Math.min(CANVAS_W - ft.pixelRadius, mouseX));
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.translate(cx, 28);

    if (currentFruitType === 2) {
      drawGrapeCloudShape(ctx, ft.pixelRadius, ft.color);
    } else if (currentFruitType === 3) {
      drawStrawberryShape(ctx, ft.pixelRadius, ft.color);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, ft.pixelRadius, 0, Math.PI * 2);
      ctx.fillStyle = ft.color;
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    ctx.font = `${ft.pixelRadius * 1.2}px "Segoe UI Emoji","Apple Color Emoji"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff3cf';
    ctx.shadowBlur = 5;
    ctx.fillText(ft.emoji, 0, 2);
    ctx.restore();
  }

  function drawFruits() {
    for (const f of fruitRenderStates) {
      if (f.scale < f.scaleTarget) {
        f.scale = Math.min(f.scaleTarget, f.scale + 0.09);
      }

      const ft = FRUIT_TYPES[f.fruitIndex];

      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.rotation);
      ctx.scale(f.scale, f.scale);

      ctx.shadowBlur = 8;
      ctx.shadowColor = ft.color;

      if (f.fruitIndex === 2) {
        drawGrapeCloudShape(ctx, f.pixelRadius, ft.color);
      } else if (f.fruitIndex === 3) {
        drawStrawberryShape(ctx, f.pixelRadius, ft.color);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, f.pixelRadius, 0, Math.PI * 2);
        ctx.fillStyle = ft.color;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(-f.pixelRadius * 0.2, -f.pixelRadius * 0.2, f.pixelRadius * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,250,210,0.4)';
      ctx.fill();

      ctx.font = `${f.pixelRadius * 1.15}px "Segoe UI Emoji","Apple Color Emoji"`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff8e7';
      ctx.shadowBlur = 4;
      ctx.fillText(ft.emoji, 0, 2);

      ctx.restore();
    }
  }

  function drawParticlesAndEffects() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.life -= p.decay;
    }
    particles = particles.filter(p => p.life > 0);

    for (const e of mergeEffects) {
      ctx.save();
      ctx.globalAlpha = e.life * 0.85;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + (e.maxR - e.radius) * (1 - e.life), 0, Math.PI * 2);
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 4 * e.life;
      ctx.stroke();
      ctx.restore();
      e.life -= 0.045;
    }
    mergeEffects = mergeEffects.filter(e => e.life > 0);
  }

  function applyGentleShake() {
    if (gentleShake > 0) {
      canvas.style.transform = `translate(${(Math.random() - 0.5) * gentleShake}px, ${(Math.random() - 0.5) * gentleShake * 0.6}px)`;
      gentleShake -= 0.25;
    } else {
      canvas.style.transform = '';
    }
  }

  function updateDashedLine(clientX) {
    const rect = canvas.getBoundingClientRect();
    const offsetX = clientX - rect.left;
    if (offsetX >= 0 && offsetX <= rect.width) {
      dropIndicatorDiv.style.display = 'block';
      dropIndicatorDiv.style.left = `${offsetX}px`;
    } else {
      dropIndicatorDiv.style.display = 'none';
    }
  }

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (CANVAS_W / rect.width);
    updateDashedLine(e.clientX);
  });

  canvas.addEventListener('mouseleave', () => {
    dropIndicatorDiv.style.display = 'none';
  });

  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    spawnFruit((e.clientX - rect.left) * (CANVAS_W / rect.width));
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (CANVAS_W / rect.width);
    updateDashedLine(e.touches[0].clientX);
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    spawnFruit((e.changedTouches[0].clientX - rect.left) * (CANVAS_W / rect.width));
    dropIndicatorDiv.style.display = 'none';
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    if (!isActivityOver) return;

    // Destroy physics world and recreate
    for (const fruit of fruits) {
      fruit.destroy();
    }
    fruits = [];
    fruitRenderStates = [];

    // FIX 5: Recreate the physics world fully on restart
    colliderMap.clear();
    physicsWorld.free();
    eventQueue.free();

    const gravity = new RAPIER.Vector2(0.0, GRAVITY);
    physicsWorld = new RAPIER.World(gravity);
    physicsWorld.integrationParameters.numSolverIterations = SOLVER_ITERATIONS;
    eventQueue = new RAPIER.EventQueue(true);
    createWalls();

    score = 0;
    scoreEl.textContent = '0';
    isActivityOver = false;
    canDrop = true;
    dropCooldown = 0;
    particles = [];
    mergeEffects = [];
    gentleShake = 0;
    comboFlash = 0;
    overlay.style.display = 'none';

    currentFruitType = randomDropType();
    pickNext();
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) e.stopPropagation();
  });

  function activityLoop() {
    drawBackground();

    if (!isActivityOver && physicsWorld && eventQueue) {
      physicsWorld.step(eventQueue);
      handleCollisionEvents();
      syncFruitsToRenderState();
      checkActivityOver();

      if (dropCooldown > 0) {
        dropCooldown--;
        if (dropCooldown === 0) canDrop = true;
      }
    }

    drawFruits();
    drawDropGuide();
    drawParticlesAndEffects();

    if (comboFlash > 0) {
      ctx.fillStyle = 'rgba(255,245,180,0.12)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      comboFlash--;
    }

    applyGentleShake();
    requestAnimationFrame(activityLoop);
  }

  window.addEventListener('error', (e) => {
    console.error('Game error:', e.error);
  });

  document.addEventListener('dblclick', (e) => {
    if (e.target === canvas) e.preventDefault();
  });

  initPhysics();
</script>
</body>
</html>

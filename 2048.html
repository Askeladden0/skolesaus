<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Classic Puzzle</title>
   <style>
    :root {
        --bg-color: #faf8ef;
        --grid-color: #bbada0;
        --tile-empty: #cdc1b4;
        --text-dark: #776e65;
        --text-light: #f9f6f2;
    }

    body {
        font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-dark);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    nav {
        width: 100%;
        background-color: #333;
        padding: 10px 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
        color: white;
    }

    nav a {
        color: #eee;
        text-decoration: none;
        font-weight: bold;
    }

    .main-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 20px;
        margin-top: 20px;
        max-width: 1200px;
    }

    .ad-space {
        width: 160px;
        height: 600px;
        background: #eee;
        border: 1px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #999;
    }

    .game-wrapper {
        width: 500px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-bottom: 10px;
    }

    .scores-container {
        display: flex;
        gap: 10px;
    }

    .score-box {
        background: var(--grid-color);
        padding: 8px 24px;
        border-radius: 8px;
        color: white;
        text-align: center;
        min-width: 80px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .score-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.85;
    }

    .score-value {
        font-size: 22px;
        font-weight: bold;
        line-height: 1.2;
        margin-top: 2px;
    }

    h1 {
        font-size: 52px;
        font-weight: bold;
        color: var(--text-dark);
        margin: 0;
        letter-spacing: -1px;
    }

    #game-board {
        width: 400px;
        height: 400px;
        background-color: var(--grid-color);
        border-radius: 12px;
        position: relative;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 15px;
        touch-action: none;
        box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }

    .tile {
        width: 100%;
        height: 100%;
        background-color: var(--tile-empty);
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 35px;
        font-weight: bold;
        transition: transform 0.12s ease, background-color 0.1s;
        box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    }

    .tile-2    { background: #eee4da; color: var(--text-dark); }
    .tile-4    { background: #ede0c8; color: var(--text-dark); }
    .tile-8    { background: #f2b179; color: var(--text-light); }
    .tile-16   { background: #f59563; color: var(--text-light); }
    .tile-32   { background: #f67c5f; color: var(--text-light); }
    .tile-64   { background: #f65e3b; color: var(--text-light); }
    .tile-128  { background: #edcf72; color: var(--text-light); font-size: 30px; }
    .tile-256  { background: #edcc61; color: var(--text-light); font-size: 30px; }
    .tile-512  { background: #edc850; color: var(--text-light); font-size: 30px; }
    .tile-1024 { background: #edc53f; color: var(--text-light); font-size: 25px; }
    .tile-2048 { background: #edc22e; color: var(--text-light); font-size: 25px; box-shadow: 0 4px 16px rgba(243,215,116,0.55); }

    @keyframes tileAppear {
        0%   { transform: scale(0); }
        60%  { transform: scale(1.08); }
        100% { transform: scale(1); }
    }

    @keyframes tileMerge {
        0%   { transform: scale(1); }
        30%  { transform: scale(1.18); }
        70%  { transform: scale(0.96); }
        100% { transform: scale(1); }
    }

    .tile-new   { animation: tileAppear 0.18s ease forwards; }
    .tile-merge { animation: tileMerge  0.22s ease forwards; }

    .controls { margin-top: 20px; text-align: center; }

    button {
        background-color: #8f7a66;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    .description {
        margin-top: 30px;
        line-height: 1.6;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .game-over {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(238, 228, 218, 0.73);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        border-radius: 12px;
    }
</style>
</head>
<body>

    <nav>
        <div style="font-size: 24px; font-weight: bold;">2048</div>
        <a href="#">Hjemmeside</a>
    </nav>

    <div class="main-container">
        <div class="ad-space">Annonse (160x600)</div>

        <div class="game-wrapper">
            <div class="header">
                <h1>2048</h1>
                <div class="scores-container">
                    <div class="score-box">
                        <div class="score-label">Poeng</div>
                        <div id="score" class="score-value">0</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">Rekord</div>
                        <div id="best" class="score-value">0</div>
                    </div>
                </div>
            </div>

            <div id="game-board">
                <div class="game-over" id="game-over">
                    <h2 id="status-text">Game Over!</h2>
                    <button onclick="resetGame()">Prøv igjen</button>
                </div>
                </div>

            <div class="controls">
                <button onclick="resetGame()">Nytt spill</button>
            </div>

            
        </div>

        <div class="ad-space">Annonse (160x600)</div>
    </div>

    <script>
        let board;
        let score = 0;
        let best = localStorage.getItem('2048-best') || 0;
        const size = 4;

        function initGame() {
            const boardElement = document.getElementById('game-board');
            document.getElementById('best').innerText = best;
            
            // Opprett rutenett visuelt
            board = Array(size).fill().map(() => Array(size).fill(0));
            
            resetGame();
        }

        function resetGame() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            score = 0;
            document.getElementById('score').innerText = 0;
            document.getElementById('game-over').style.display = 'none';
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

       function updateBoard(mergedCells = [], newCells = []) {
    const boardElement = document.getElementById('game-board');
    const gameOverUI = document.getElementById('game-over');
    boardElement.innerHTML = '';
    boardElement.appendChild(gameOverUI);

    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            let tile = document.createElement('div');
            tile.className = 'tile';
            let val = board[r][c];
            if (val > 0) {
                tile.innerText = val;
                tile.classList.add('tile-' + val);
                const key = r + ',' + c;
                if (mergedCells.includes(key)) {
                    tile.classList.add('tile-merge');
                } else if (newCells.includes(key)) {
                    tile.classList.add('tile-new');
                }
            }
            boardElement.appendChild(tile);
        }
    }
}

        // Logikk for bevegelse
        function filterZero(row) { return row.filter(num => num !== 0); }

        function slide(row) {
            row = filterZero(row);
            for (let i = 0; i < row.length - 1; i++) {
                if (row[i] === row[i+1]) {
                    row[i] *= 2;
                    row[i+1] = 0;
                    score += row[i];
                }
            }
            row = filterZero(row);
            while (row.length < size) row.push(0);
            return row;
        }

        let lastNewCell = null;

function addRandomTile() {
    let emptyCells = [];
    for (let r = 0; r < size; r++)
        for (let c = 0; c < size; c++)
            if (board[r][c] === 0) emptyCells.push({r, c});
    if (emptyCells.length > 0) {
        let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        board[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
        lastNewCell = cell.r + ',' + cell.c;
    }
}

function move(direction) {
    let oldBoard = JSON.stringify(board);
    let mergedCells = [];

    if (direction === 'left' || direction === 'right') {
        for (let r = 0; r < size; r++) {
            let row = board[r];
            if (direction === 'right') row.reverse();
            let result = slideTrack(row, r, direction === 'right', true, mergedCells);
            board[r] = result;
            if (direction === 'right') board[r].reverse();
        }
    } else {
        for (let c = 0; c < size; c++) {
            let row = [board[0][c], board[1][c], board[2][c], board[3][c]];
            if (direction === 'down') row.reverse();
            let result = slideTrack(row, c, direction === 'down', false, mergedCells);
            if (direction === 'down') result.reverse();
            for (let r = 0; r < size; r++) board[r][c] = result[r];
        }
    }

    if (oldBoard !== JSON.stringify(board)) {
        lastNewCell = null;
        addRandomTile();
        updateBoard(mergedCells, lastNewCell ? [lastNewCell] : []);
        checkStatus();
    }
}

function slideTrack(row, lineIdx, reversed, isRow, mergedCells) {
    row = row.filter(n => n !== 0);
    for (let i = 0; i < row.length - 1; i++) {
        if (row[i] === row[i+1]) {
            row[i] *= 2;
            row[i+1] = 0;
            score += row[i];
            // Finn posisjon i brettet
            let filled = row.slice(0, i+1).filter(n => n !== 0);
            let pos = filled.length - 1; // kolonnen/raden i komprimert row
            // Enkelt: merk alle merged som hele raden for visning
            // Vi beregner den faktiske grid-nøkkelen
            let nonZero = row.filter((_, j) => j <= i+1 && row[j] !== 0).length;
            // Bruk posisjon i output-rad
            let outIdx = reversed ? (size - 1 - pos) : pos;
            let key = isRow ? (lineIdx + ',' + outIdx) : (outIdx + ',' + lineIdx);
            mergedCells.push(key);
        }
    }
    row = row.filter(n => n !== 0);
    while (row.length < size) row.push(0);
    return row;
}

        function checkStatus() {
            document.getElementById('score').innerText = score;
            if (score > best) {
                best = score;
                localStorage.setItem('2048-best', best);
                document.getElementById('best').innerText = best;
            }

            // Sjekk seier
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 2048) {
                        showGameOver("Du vant!");
                        return;
                    }
                }
            }

            // Sjekk game over (ingen trekk mulig)
            let movesPossible = false;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) movesPossible = true;
                    if (r < size - 1 && board[r][c] === board[r+1][c]) movesPossible = true;
                    if (c < size - 1 && board[r][c] === board[r][c+1]) movesPossible = true;
                }
            }

            if (!movesPossible) showGameOver("Game Over!");
        }

        function showGameOver(text) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('game-over').style.display = 'flex';
        }

        // Input
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });

        initGame();
    </script>
</body>
</html>
